<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- barra de navegação -->
    <header>
        <nav>
            <a href="sobre.html">Sobre mim</a>
            <a href="formacao.html">Formação</a>
            <a href="portfolio.html">Portfólio</a>
            <a href="contato.html" class="active">Contato</a>
            <button id="theme-toggle">Alternar Tema</button>
        </nav>
    </header>

    <main>

        <!-- Formulário para contato -->
        <h1>Entre em Contato</h1>
        <hr>
        <form id="contact-form">
            <div class="field">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" placeholder="Seu nome aqui..." required>
            </div>

            <div class="field">
                <label for="email">E-mail para contato:</label>
                <input type="email" id="email" placeholder="exemplo@email.com" required>
            </div>

            <div class="field">
                <label for="mensagem">Sua Mensagem:</label>
                <textarea id="mensagem" rows="5" placeholder="Escreva sua mensagem..." required></textarea>
            </div>

            <button type="submit" id="btn-enviar">Enviar Mensagem</button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
